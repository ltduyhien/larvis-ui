server {
    # server: Define a virtual server block — nginx uses this to decide
    # how to handle incoming HTTP requests.

    listen 80;
    # listen: Accept connections on port 80 (standard HTTP).
    # Inside the Docker container, this is the port nginx binds to.
    # docker-compose.yml maps the host port (5173) to this.

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        root /usr/share/nginx/html;
        # root: The directory containing the built React static files (copied from Vite's dist/).

        index index.html;
        # index: When a directory is requested, serve index.html by default.

        try_files $uri $uri/ /index.html;
        # try_files: SPA fallback — first try to serve the exact file requested ($uri),
        # then try it as a directory ($uri/), and if neither exists, serve /index.html.
        # This ensures client-side routing (e.g. /users/alice) works on page refresh
        # instead of returning a 404 from nginx.
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /api/ {
    # location /api/: Intercept any request starting with /api/ and forward it to the backend.
    # This acts as a reverse proxy so the frontend can call /api/token, /api/users, etc.
    # without running into CORS issues (same-origin requests).

        proxy_pass http://backend:8080/;
        # proxy_pass: Forward the request to the backend service on port 8080.
        # "backend" resolves via Docker's internal DNS to the backend container.
        # The trailing / strips the /api/ prefix — so /api/token becomes /token on the backend.

        proxy_set_header Host $host;
        # proxy_set_header Host: Pass the original Host header to the backend
        # so it knows which host the client originally requested.

        proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Real-IP: Pass the client's real IP address to the backend.
        # Without this, the backend would only see the nginx container's internal IP.
    }
}
